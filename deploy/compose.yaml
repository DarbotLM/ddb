# DarbotDB — remote mode (darbot@10.1.8.69 / spark-804f)
# Graph engine runs on the DGX Spark; API runs locally or in container.

services:
  darbotdb-api:
    container_name: darbotdb-api
    restart: unless-stopped
    build:
      context: ../ddb
    environment:
      # DarbotDB graph engine (remote on spark-804f)
      - DDB_HOSTS=http://10.1.8.69:8529
      - DDB_DATABASE=txt2kg
      - DDB_USERNAME=root
      - DDB_PASSWORD=
      - API_PORT=8080
      # txt2kg knowledge graph bridge
      - TXT2KG_URL=http://10.1.8.69:3001
      - TXT2KG_DDB_URL=http://10.1.8.69:8529
      - TXT2KG_DDB_NAME=txt2kg
      - TXT2KG_OLLAMA_URL=http://10.1.8.69:11434
      - TXT2KG_MODEL=qwen3:32b
    ports:
      - "8530:8080"
    volumes:
      - micro-data:/app/data

volumes:
  micro-data:
