<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DDB Memory Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; background: #fafafa; }
    h2 { margin-bottom: 12px; color: #1a1a1a; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-bar input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .search-bar button { padding: 8px 16px; background: #7b1fa2; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .results { display: flex; flex-direction: column; gap: 8px; }
    .result-card { background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 12px; }
    .result-title { font-weight: 700; font-size: 15px; }
    .result-meta { font-size: 12px; color: #666; margin-top: 4px; }
    .result-content { margin-top: 6px; font-size: 14px; color: #333; }
    .confidence-bar { height: 4px; border-radius: 2px; background: #e0e0e0; margin-top: 6px; }
    .confidence-fill { height: 100%; border-radius: 2px; background: #7b1fa2; }
    .empty { text-align: center; padding: 32px; color: #888; }
    #loading { text-align: center; padding: 32px; color: #888; }
  </style>
</head>
<body>
  <h2>Memory Recall</h2>
  <div class="search-bar">
    <input id="search-input" type="text" placeholder="Search memories, patterns, observations..." />
    <button id="search-btn">Recall</button>
  </div>
  <div id="loading" style="display:none">Searching...</div>
  <div id="results" class="results">
    <div class="empty">Enter a query to recall memories from the knowledge graph</div>
  </div>

  <script type="module">
    import { App } from "@modelcontextprotocol/ext-apps";

    const app = new App({ name: "DDB Memory Dashboard", version: "0.1.0" });
    app.connect();

    const searchInput = document.getElementById("search-input");
    const searchBtn = document.getElementById("search-btn");
    const resultsDiv = document.getElementById("results");
    const loadingDiv = document.getElementById("loading");

    function renderResults(data) {
      const results = data.results || [];
      if (!results.length) {
        resultsDiv.innerHTML = '<div class="empty">No memories found for this query</div>';
        return;
      }
      resultsDiv.innerHTML = results.map(r => `
        <div class="result-card">
          <div class="result-title">${r.title || r.card_type || "Memory"}</div>
          <div class="result-meta">${r.card_type || ""} · ${r.zone || "no zone"} · ${r.created_at || ""}</div>
          <div class="result-content">${r.content_md || r.description || ""}</div>
          ${r.confidence !== undefined ? `
            <div class="confidence-bar"><div class="confidence-fill" style="width:${r.confidence * 100}%"></div></div>
          ` : ""}
        </div>
      `).join("");
    }

    async function doSearch() {
      const query = searchInput.value.trim();
      if (!query) return;
      loadingDiv.style.display = "block";
      resultsDiv.innerHTML = "";
      const result = await app.callServerTool({
        name: "ddb-memory-recall",
        arguments: { query },
      });
      loadingDiv.style.display = "none";
      const text = result.content?.find(c => c.type === "text")?.text;
      if (text) renderResults(JSON.parse(text));
    }

    searchBtn.addEventListener("click", doSearch);
    searchInput.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });

    app.ontoolresult = (result) => {
      const text = result.content?.find(c => c.type === "text")?.text;
      if (text) {
        try {
          const data = JSON.parse(text);
          if (data.query) searchInput.value = data.query;
          renderResults(data);
        } catch {}
      }
    };
  </script>
</body>
</html>
